name: Build and Deploy to Aruba

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - 'supabase/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v7

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      # Install deps
      - name: Install dependencies
        run: npm install

      # Cache Playwright browsers (Chromium) tra le run
      - name: Cache Playwright browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      # Chromium serve allo step di prerender (postbuild di npm run build)
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # Build
      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # Deploy via FTP su Aruba
      - name: Deploy via FTP to Aruba
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_DIR }}
          local-dir: ./dist/
          protocol: ftps

      # Cache bust (efficace su Aruba)
      - name: Bust cache
        run: curl https://www.lacco.it/favicon.ico?cb=${{ github.run_id }}
