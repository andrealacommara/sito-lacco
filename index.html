<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0"
    />
    <% if (preloadCss) { %>
    <link rel="preload" as="style" href="<%= entryCss %>" />
    <% } %> <% if (preloadJs) { %>
    <link rel="modulepreload" href="<%= entryJs %>" />
    <% } %>

    <!-- ========================== BASIC SEO ========================== -->
    <!-- Core metadata for search engines and browser previews -->
    <title>Lacco</title>
    <meta
      name="description"
      content="Lacco è un cantante e cantautore Pop, R&B e Hip-Hop. Per chi sente più di quanto riesca a dire. Ascolta la sua musica, scopri i live e rimani aggiornato."
    />
    <meta name="author" content="Lacco" />

    <!-- ========================== OPEN GRAPH / FACEBOOK ========================== -->
    <!-- Enables rich previews when the site is shared on Facebook and other platforms -->
    <meta property="og:type" content="profile" />
    <meta property="og:site_name" content="Lacco" />
    <meta property="og:title" content="Lacco" />
    <meta
      property="og:description"
      content="Lacco è un cantante e cantautore Pop, R&B e Hip-Hop. Per chi sente più di quanto riesca a dire. Ascolta la sua musica, scopri i live e rimani aggiornato."
    />
    <meta property="og:url" content="https://lacco.it" />
    <meta property="og:image" content="https://lacco.it/og-image.jpg" />
    <meta property="og:image:alt" content="Lacco — Cantante e Cantautore" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="it_IT" />

    <!-- ========================== TWITTER CARD ========================== -->
    <!-- Twitter metadata for link previews -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lacco" />
    <meta
      name="twitter:description"
      content="Lacco è un cantante e cantautore Pop, R&B e Hip-Hop. Per chi sente più di quanto riesca a dire."
    />
    <meta name="twitter:image" content="https://lacco.it/og-image.jpg" />

    <!-- ========================== ICONS ========================== -->
    <!-- Favicon and app icons for different devices and browsers -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#000000" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ========================== THEME COLORS ========================== -->
    <!-- Colore della barra del browser (Safari/Chrome mobile). Valore di default
         sovrascritto dallo script qui sotto col tema reale prima del primo paint. -->
    <meta name="theme-color" content="#000000" />

    <!-- Bootstrap tema: imposta data-theme e theme-color PRIMA del paint per
         evitare il flash (FOUC) e la "banda bianca" quando il tema scelto diverge
         dalla preferenza del sistema operativo. Replica la logica di ThemeSwitch
         (localStorage `user-theme` con scadenza 24h, fallback su prefers-color-scheme). -->
    <script>
      (function () {
        try {
          var THEME_EXPIRATION_MS = 24 * 60 * 60 * 1000;
          var saved = localStorage.getItem("user-theme");
          var timestamp = localStorage.getItem("user-theme-timestamp");
          var theme = null;

          if (saved && timestamp) {
            if (Date.now() - parseInt(timestamp, 10) <= THEME_EXPIRATION_MS) {
              theme = saved;
            } else {
              localStorage.removeItem("user-theme");
              localStorage.removeItem("user-theme-timestamp");
            }
          }

          if (theme !== "dark" && theme !== "light") {
            theme = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }

          document.documentElement.setAttribute("data-theme", theme);

          // Le slug immersive prerenderizzate "cuociono" data-force-theme-color
          // su <html>: la barra deve restare di quel colore a prescindere dalla
          // preferenza di sistema, già da questo primo paint (niente banda bianca).
          var force = document.documentElement.getAttribute("data-force-theme-color");
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.setAttribute("content", force || (theme === "dark" ? "#000000" : "#ffffff"));
          }
        } catch (e) {
          /* localStorage/matchMedia non disponibili: si usa il default del meta. */
        }
      })();
    </script>

    <!-- ========================== MICROSOFT ========================== -->
    <!-- Pinned site tile color and config for Windows browsers -->
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- ========================== FONTS ========================== -->
    <!-- Font self-hostati (woff2 variabili, @font-face in globals.css): niente
         richiesta render-blocking cross-origin a Google Fonts. NESSUN preload:
         con createRoot l'LCP dipende dal mount di React, e un preload font ad alta
         priorità ruberebbe banda al bundle JS ritardando l'LCP. I font arrivano via
         @font-face con `display: swap` (testo subito in fallback, poi swap). -->

    <!-- ========================== RESOURCE HINTS ========================== -->
    <!-- Speed up third-party embeds and critical routes used across the site -->
    <link rel="preconnect" href="https://open.spotify.com" crossorigin />
    <link rel="preconnect" href="https://i.scdn.co" crossorigin />
    <link rel="preconnect" href="https://hnjsfwhtnntjzpwzxgut.supabase.co" crossorigin />

    <!-- ========================== GOOGLE SEARCH CONSOLE ========================== -->
    <!-- Site ownership verification for Google indexing -->
    <meta
      name="google-site-verification"
      content="181FTmk6Q3tTuacqdHrjJiRoA2gt_UodmPeRWt_UYmA"
    />

    <!-- ========================== STRUCTURED DATA (JSON-LD) ========================== -->
    <!-- Helps Google recognize the artist as a verified brand entity -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MusicGroup",
        "@id": "https://lacco.it/#artist",
        "name": "Lacco",
        "url": "https://lacco.it",
        "logo": "https://lacco.it/favicon-512.png",
        "image": "https://lacco.it/og-image.jpg",
        "description": "Lacco è un cantante e cantautore Pop, R&B e Hip-Hop. Per chi sente più di quanto riesca a dire.",
        "genre": ["Pop", "R&B", "Hip-Hop"],
        "member": {
          "@type": "Person",
          "name": "Lacco",
          "jobTitle": ["Cantante", "Cantautore"],
          "url": "https://lacco.it"
        },
        "sameAs": [
          "https://open.spotify.com/artist/6viihrUFd4eGCfv9w61tL7",
          "https://instagram.com/laccoverse",
          "https://tiktok.com/@laccoverse",
          "https://music.apple.com/it/artist/lacco/1773060241",
          "https://www.youtube.com/@Laccoverse"
        ]
      }
    </script>
  </head>

  <body>
    <!-- ========================== ROOT ELEMENT ========================== -->
    <!-- React mounts the entire app inside this container -->
    <div id="root"></div>

    <!-- ========================== ENTRY SCRIPT ========================== -->
    <!-- Main entry point: initializes React app and providers -->
    <script fetchpriority="high" type="module" src="/src/main.tsx"></script>
  </body>
</html>
