<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0"
    />
    <% if (preloadCss) { %>
    <link rel="preload" as="style" href="<%= entryCss %>" />
    <% } %> <% if (preloadJs) { %>
    <link rel="modulepreload" href="<%= entryJs %>" />
    <% } %>

    <!-- ========================== BASIC SEO ========================== -->
    <!-- Core metadata for search engines and browser previews -->
    <title>Lacco</title>
    <meta
      name="description"
      content="Lacco è un cantautore Pop, R&B e Hip-Hop. Per chi sente più di quanto riesca a dire. Ascolta la sua musica, scopri i live e rimani aggiornato."
    />
    <meta name="author" content="Lacco" />

    <!-- ========================== OPEN GRAPH / FACEBOOK ========================== -->
    <!-- Enables rich previews when the site is shared on Facebook and other platforms -->
    <meta property="og:type" content="profile" />
    <meta property="og:site_name" content="Lacco" />
    <meta property="og:title" content="Lacco" />
    <meta
      property="og:description"
      content="Lacco è un cantautore Pop, R&B e Hip-Hop. Per chi sente più di quanto riesca a dire. Ascolta la sua musica, scopri i live e rimani aggiornato."
    />
    <meta property="og:url" content="https://lacco.it" />
    <meta property="og:image" content="https://lacco.it/og-image.jpg" />
    <meta property="og:image:alt" content="Lacco — Cantautore" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="it_IT" />

    <!-- ========================== TWITTER CARD ========================== -->
    <!-- Twitter metadata for link previews -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lacco" />
    <meta
      name="twitter:description"
      content="Lacco è un cantautore Pop, R&B e Hip-Hop. Per chi sente più di quanto riesca a dire."
    />
    <meta name="twitter:image" content="https://lacco.it/og-image.jpg" />

    <!-- ========================== ICONS ========================== -->
    <!-- Favicon and app icons for different devices and browsers -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#000000" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ========================== THEME COLORS ========================== -->
    <!-- Defines colors for light and dark mode browser UI -->
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#ffffff"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#000000"
    />

    <!-- ========================== MICROSOFT ========================== -->
    <!-- Pinned site tile color and config for Windows browsers -->
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="msapplication-config" content="/browserconfig.xml" />

    <!-- ========================== FONTS ========================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Reduced to only 400 (regular) and 700 (bold) + italics: covers 99% use case, saves ~80KB -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />

    <!-- ========================== RESOURCE HINTS ========================== -->
    <!-- Speed up third-party embeds and critical routes used across the site -->
    <link rel="preconnect" href="https://open.spotify.com" crossorigin />
    <link rel="preconnect" href="https://i.scdn.co" crossorigin />
    <link rel="preconnect" href="https://api.emailjs.com" crossorigin />
    <!-- Prefetch DNS for Google Fonts glyph CDN (helps with font load) -->
    <link rel="prefetch" href="https://fonts.gstatic.com" crossorigin />

    <!-- ========================== GOOGLE SEARCH CONSOLE ========================== -->
    <!-- Site ownership verification for Google indexing -->
    <meta
      name="google-site-verification"
      content="181FTmk6Q3tTuacqdHrjJiRoA2gt_UodmPeRWt_UYmA"
    />

    <!-- ========================== STRUCTURED DATA (JSON-LD) ========================== -->
    <!-- Helps Google recognize the artist as a verified brand entity -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "MusicGroup",
        "name": "Lacco",
        "url": "https://lacco.it",
        "logo": "https://lacco.it/favicon-512.png",
        "image": "https://lacco.it/og-image.jpg",
        "description": "Lacco è un cantautore Pop, R&B e Hip-Hop. Per chi sente più di quanto riesca a dire.",
        "genre": ["Pop", "R&B", "Hip-Hop"],
        "sameAs": [
          "https://open.spotify.com/artist/6viihrUFd4eGCfv9w61tL7",
          "https://instagram.com/laccoverse",
          "https://tiktok.com/@laccoverse",
          "https://music.apple.com/it/artist/lacco/1773060241",
          "https://youtube.com/@laccoverse"
        ]
      }
    </script>
  </head>

  <body>
    <!-- ========================== ROOT ELEMENT ========================== -->
    <!-- React mounts the entire app inside this container -->
    <div id="root"></div>

    <!-- ========================== ENTRY SCRIPT ========================== -->
    <!-- Main entry point: initializes React app and providers -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
